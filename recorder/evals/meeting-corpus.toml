# Real meeting eval corpus — measures the streaming-vs-offline gap.
#
# `ref_transcript` is the offline parakeet output frozen at a known-good
# point. NOT human-labeled, but stable across runs (the live offline.txt
# would drift on each --force regen and turn offline_wer into a
# determinism floor measurement instead of a real number).

[[clips]]
id = "M1-2min"
path = "~/recordings/test-corpus/meeting-trimmed/m1_2min.flac"
duration_s = 120.0
speakers = 5
ref_transcript = "~/recordings/test-corpus/meeting-trimmed/m1_2min.offline-frozen.txt"
ref_rttm = ""
notes = "real meeting first 2min; ref=offline parakeet, frozen; ~395 words"

[[clips]]
id = "M1-full"
path = "~/recordings/20260506-163338.flac"
duration_s = 1190.0
speakers = 5
ref_transcript = "~/recordings/20260506-163338.offline-frozen.txt"
ref_rttm = "~/recordings/20260506-163338.diarized.json"
notes = "full real meeting (19:50); skip-live for fast iteration"
