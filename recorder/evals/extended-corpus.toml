# Extended eval corpus -- gap fills for recorder (parakeet-mlx + sherpa-onnx).
#
# Supplements meeting-corpus.toml with clips targeting:
#   short-dictation, noisy environments, VoIP codec compression, accent
#   robustness, jargon/proper nouns, long-form, overlapping speech.
#
# All paths expand ~ via Path.expanduser() in run_eval.py.
# Run before using: bash ~/recordings/test-corpus/extended/setup.sh
#
# URL STATUS: all external source URLs in this file are UNVERIFIED at write time.
# See ~/recordings/test-corpus/extended/README.md for curl verification one-liners.

# ---------------------------------------------------------------------------
# Short dictation (5 / 15 / 30 s)
# Measures streaming latency at short clip boundary; no long-context advantages.
# Ground truth: same sentence as base LibriSpeech L1 clip (manual trimmed).
# ---------------------------------------------------------------------------

[[clips]]
id = "short-5s"
path = "~/recordings/test-corpus/extended/short-dictation/ls_1272_0000_5s.flac"
duration_s = 5.0
speakers = 1
ref_transcript = "~/recordings/test-corpus/extended/short-dictation/ls_1272_0000.txt"
ref_rttm = ""
notes = "5-second dictation; LibriSpeech 1272-128104-0000 trimmed; male US English"

[[clips]]
id = "short-15s"
path = "~/recordings/test-corpus/extended/short-dictation/ls_1272_0000_15s.flac"
duration_s = 15.0
speakers = 1
ref_transcript = "~/recordings/test-corpus/extended/short-dictation/ls_1272_0000.txt"
ref_rttm = ""
notes = "15-second dictation; same source"

[[clips]]
id = "short-30s"
path = "~/recordings/test-corpus/extended/short-dictation/ls_1272_0000_30s.flac"
duration_s = 30.0
speakers = 1
ref_transcript = "~/recordings/test-corpus/extended/short-dictation/ls_1272_0000.txt"
ref_rttm = ""
notes = "30-second dictation; same source"

# ---------------------------------------------------------------------------
# Noisy environment -- DEMAND-style cafe mix
# Three SNR levels.  Ground truth inherited from LS clip.
# Baseline comparison: run the same clip ID from the base corpus (L1) for
# clean-vs-noisy delta; compare WER(noisy) - WER(clean).
# DEMAND source: https://zenodo.org/record/1227121 (UNVERIFIED, CC BY 4.0)
# If DEMAND_NOISE_FILE was set during setup.sh, this is real noise.
# Otherwise it is pink-noise babble (still exercises the degraded-audio path).
# ---------------------------------------------------------------------------

[[clips]]
id = "noise-snr20"
path = "~/recordings/test-corpus/extended/demand/cafe_snr20db.flac"
duration_s = 14.0
speakers = 1
ref_transcript = "~/recordings/test-corpus/extended/demand/ls_1272_0000.txt"
ref_rttm = ""
notes = "cafe noise mix SNR=20 dB; DEMAND or pink-noise substitute; male US English"

[[clips]]
id = "noise-snr10"
path = "~/recordings/test-corpus/extended/demand/cafe_snr10db.flac"
duration_s = 14.0
speakers = 1
ref_transcript = "~/recordings/test-corpus/extended/demand/ls_1272_0000.txt"
ref_rttm = ""
notes = "cafe noise mix SNR=10 dB; moderate degradation"

[[clips]]
id = "noise-snr5"
path = "~/recordings/test-corpus/extended/demand/cafe_snr5db.flac"
duration_s = 14.0
speakers = 1
ref_transcript = "~/recordings/test-corpus/extended/demand/ls_1272_0000.txt"
ref_rttm = ""
notes = "cafe noise mix SNR=5 dB; severe degradation"

# ---------------------------------------------------------------------------
# VoIP codec compression -- Zoom/Opus simulation
# Encodes LS clip to Opus 32 kbps (VoIP profile) then decodes back to FLAC.
# Directly comparable to clean L1 clip; WER delta = codec degradation.
# No external download; generated by setup.sh ffmpeg recipe.
# ---------------------------------------------------------------------------

[[clips]]
id = "zoom-opus32k"
path = "~/recordings/test-corpus/extended/zoom-sim/ls_1272_0000_opus32k.flac"
duration_s = 14.0
speakers = 1
ref_transcript = "~/recordings/test-corpus/extended/zoom-sim/ls_1272_0000.txt"
ref_rttm = ""
notes = "Opus 32 kbps VoIP re-encode; simulates Zoom at low bitrate; male US English"

