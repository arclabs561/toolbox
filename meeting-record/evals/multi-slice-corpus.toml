# Multi-slice corpus — 4 distinct 2-min slices of the same real meeting.
# Different parts of the meeting have different speaker dominance, topic
# vocabulary, and audio characteristics, so averaging across slices is
# a more honest baseline than any single slice.

[[clips]]
id = "M1-00-02"
path = "~/recordings/test-corpus/meeting-trimmed/m1_2min.flac"
duration_s = 120.0
speakers = 5
ref_transcript = "~/recordings/test-corpus/meeting-trimmed/m1_2min.offline-frozen.txt"
notes = "first 2 min — opening + V5 environment discussion"

[[clips]]
id = "M1-05-07"
