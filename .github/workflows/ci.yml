name: ci

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: shellcheck (bash tools + tests)
        run: shellcheck -e SC1091 bcat/bcat blinks/blinks trunk/trunk tests/*.sh
      - name: bash syntax
        run: |
          for f in bcat/bcat blinks/blinks trunk/trunk tests/*.sh; do bash -n "$f"; done
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: ruff check
        run: uvx ruff@0.14.10 check .
      - name: ruff format
        run: uvx ruff@0.14.10 format --check .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: test suite (core + uv tools; browser tools skipped)
        run: bash tests/run.sh

  browser:
    # webshot + check-math, exercised against local fixtures. Heavy deps, so
    # isolated from lint/test: those gate independently of Playwright/go-grip.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: install go-grip
        run: |
          go install github.com/chrishrb/go-grip@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: install playwright chromium
        run: uvx --from playwright playwright install --with-deps chromium
      - name: browser tests
        env:
          TOOLBOX_BROWSER: "1"
        run: bash tests/test_browser.sh
