# AMI meeting corpus -- diarization DER ground truth.
#
# Real multi-speaker meetings from the AMI Meeting Corpus (CC-BY-4.0), with
# human-labeled RTTM speaker references from pyannote/AMI-diarization-setup
# (manual annotations v1.6.2). This is the diarization calibration oracle:
# unlike the project's own recordings, these have a TRUE speaker timeline, so
# DER measures real diarization error rather than the pipeline agreeing with
# itself.
#
# Audio is the AMI Mix-Headset track (the mixed meeting, closest to what a
# single-device recorder captures), downconverted to 16kHz mono FLAC to match
# the recorder pipeline. All three meetings have 4 speakers.
#
# Fetch: see evals/fetch_ami.sh (downloads 3 meetings + RTTM, ~40MB).
# Run:   uv run evals/run_eval.py --corpus evals/ami-corpus.toml --skip-live

[[clips]]
id = "AMI-ES2002a"
path = "~/recordings/test-corpus/ami/audio/ES2002a.flac"
duration_s = 1272.6
speakers = 4
ref_transcript = ""
ref_rttm = "~/recordings/test-corpus/ami/rttm/ES2002a.rttm"
notes = "AMI ES2002a, 4-speaker product-design meeting (~21min)"

