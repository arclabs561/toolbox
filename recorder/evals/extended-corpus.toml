# ---------------------------------------------------------------------------
# Jargon / proper nouns -- Spoken Wikipedia physics article
# License: CC BY-SA 3.0
# MANUAL DOWNLOAD: see ~/recordings/test-corpus/extended/spoken-wikipedia/MANUAL_DOWNLOAD.txt
