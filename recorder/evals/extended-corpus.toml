ref_rttm = ""
notes = "Spoken Wikipedia Niels Bohr article; ~8 min; jargon + proper nouns; CC BY-SA 3.0; MANUAL DOWNLOAD required"

# ---------------------------------------------------------------------------
# Long-form 1 h+ -- LibriVox audiobook
# License: Public domain (LibriVox + Project Gutenberg)
